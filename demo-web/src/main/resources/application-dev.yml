# 开发环境 - H2 数据库
spring:
  datasource:
    url: jdbc:h2:mem:demoform;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql

# Camunda 配置（开发环境）
camunda:
  bpm:
    admin-user:
      id: admin
      password: admin
    database:
      type: h2
    auto-deployment-enabled: true
